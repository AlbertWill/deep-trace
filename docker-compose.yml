services:
  deep-trace:
    build: .
    ports:
      - "127.0.0.1:8888:8888"
    env_file:
      - agent/.env
    environment:
      - DEEP_TRACE_TRUST_DOCKER_LOOPBACK=1
    volumes:
      - deep-trace-runs:/app/agent/runs
      - deep-trace-sessions:/app/agent/sessions
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://deep-trace:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      deep-trace:
        condition: service_started

volumes:
  deep-trace-runs:
  deep-trace-sessions:
